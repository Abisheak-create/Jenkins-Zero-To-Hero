apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        image: abisheak469/ultimate-cicd:18
        ports:
        - containerPort: 8080
      # ADD THIS SECTION HERE
      imagePullSecrets:
      - name: docker-hub-cred